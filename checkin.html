<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu QR Code — MEC Summit 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',Arial,sans-serif;
      background:#0C0C1E;
      color:#fff;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:32px 20px;
    }
    .card{
      background:#1C1C3A;
      border:1px solid rgba(245,184,0,.2);
      border-radius:20px;
      padding:40px 32px;
      max-width:440px;
      width:100%;
      text-align:center;
    }
    .brand{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#F5B800;margin-bottom:20px}
    h1{font-size:20px;font-weight:800;margin-bottom:6px}
    .nome{font-size:26px;font-weight:900;color:#F5B800;margin-bottom:24px}
    .qr-frame{
      background:#fff;
      border-radius:14px;
      padding:16px;
      display:inline-block;
      margin-bottom:20px;
    }
    .qr-frame img{display:block;width:200px;height:200px}
    .tip{
      background:rgba(245,184,0,.08);
      border:1px solid rgba(245,184,0,.2);
      border-radius:10px;
      padding:12px 16px;
      font-size:13px;color:#CCCCDD;
      line-height:1.6;margin-bottom:20px;
    }
    .info{font-size:13px;color:#8888AA;line-height:1.7;margin-bottom:24px}
    .info strong{color:#CCCCDD}
    a.back{
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 20px;border-radius:8px;
      font-size:13px;font-weight:700;text-decoration:none;
      color:#CCCCDD;border:1px solid rgba(255,255,255,.15);
    }
    /* formulário */
    .form-wrap p{font-size:14px;color:#8888AA;line-height:1.6;margin-bottom:16px;text-align:left}
    .row{display:flex;gap:8px;margin-bottom:6px}
    input[type=email]{
      flex:1;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:8px;padding:12px 14px;
      font-size:14px;color:#fff;font-family:inherit;outline:none;
    }
    input[type=email]:focus{border-color:#F5B800}
    input::placeholder{color:rgba(255,255,255,.25)}
    button{
      background:#F5B800;color:#0C0C1E;
      border:none;border-radius:8px;
      padding:12px 18px;font-size:14px;
      font-weight:700;cursor:pointer;font-family:inherit;
      white-space:nowrap;
    }
    .err{color:#ef4444;font-size:12px;display:none;margin-top:4px}
    .loading{color:#8888AA;font-size:14px;padding:20px 0}
  </style>
</head>
<body>
<div class="card">
  <p class="brand">MEC Summit 2026 · Check-in</p>
  <div id="app"><p class="loading">Carregando…</p></div>
</div>

<script>
var BASE = 'https://dayyan-morandi.github.io/mecevento/';

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function telaQR(email, nome) {
  // Token simples: base64 de "email|nome"
  var token = btoa(unescape(encodeURIComponent(email + '|' + nome)));
  var url   = BASE + 'admin.html?token=' + token;

  // QR gerado por API pública como <img> diretamente no DOM
  var src = 'https://api.qrserver.com/v1/create-qr-code/'
    + '?size=200x200&margin=4'
    + '&data=' + encodeURIComponent(url);

  render(
    '<h1>Olá,</h1>' +
    '<p class="nome">' + (nome ? nome.split(' ')[0] : email) + '</p>' +
    '<div class="qr-frame">' +
      '<img src="' + src + '" alt="QR Code" ' +
           'onerror="this.src=\'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url) + '\'" />' +
    '</div>' +
    '<div class="tip"><strong style="color:#F5B800">Como usar:</strong> Mostre este QR code na entrada do evento.</div>' +
    '<div class="info">' +
      '<strong>📅 25 de Maio de 2026</strong> · 19h00<br/>' +
      '<strong>📍 ESPM São Paulo</strong> · Portas abrem às 18h30' +
    '</div>' +
    '<a class="back" href="' + BASE + '">← Voltar ao site</a>'
  );
}

function telaForm(erro) {
  render(
    '<div class="form-wrap">' +
    '<div style="font-size:36px;margin-bottom:12px">🎟️</div>' +
    '<h1 style="margin-bottom:12px">Seu QR code</h1>' +
    '<p>Digite o e-mail usado na inscrição:</p>' +
    '<div class="row">' +
      '<input type="email" id="inp" placeholder="seu@email.com" />' +
      '<button onclick="submeter()">Gerar</button>' +
    '</div>' +
    '<p class="err" id="err">' + (erro || 'Digite um e-mail válido.') + '</p>' +
    '<p style="margin-top:16px;font-size:12px;color:#8888AA">' +
      'Não se inscreveu? <a href="' + BASE + '#inscricao" style="color:#F5B800">Inscreva-se grátis →</a>' +
    '</p>' +
    '</div>'
  );
  var inp = document.getElementById('inp');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submeter(); });
  }
}

function submeter() {
  var inp   = document.getElementById('inp');
  var errEl = document.getElementById('err');
  var email = inp ? inp.value.trim() : '';
  if (!email || !email.includes('@')) {
    if (errEl) errEl.style.display = 'block';
    return;
  }
  telaQR(email, '');
}

// Inicialização
(function() {
  try {
    var p     = new URLSearchParams(location.search);
    var email = (p.get('email') || '').trim();
    var nome  = (p.get('nome')  || p.get('name') || '').trim();
    if (email) {
      telaQR(email, nome);
    } else {
      telaForm();
    }
  } catch(e) {
    render('<p style="color:#ef4444;font-size:14px;padding:20px">Erro: ' + e.message + '</p>');
  }
})();
</script>
</body>
</html>
