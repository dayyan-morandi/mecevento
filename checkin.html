<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QR Code — MEC Summit 2026</title>
<style>
body{margin:0;padding:20px;background:#0C0C1E;color:#fff;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:#1C1C3A;border:2px solid #F5B800;border-radius:16px;padding:32px;max-width:420px;width:100%;text-align:center;}
.gold{color:#F5B800;}
h2{font-size:20px;margin-bottom:8px;}
.nome{font-size:24px;font-weight:900;color:#F5B800;margin-bottom:20px;}
.qr{background:#fff;border-radius:10px;padding:12px;display:inline-block;margin-bottom:16px;}
.qr img{display:block;width:200px;height:200px;}
.info{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:16px;}
.tip{background:rgba(245,184,0,.1);border:1px solid rgba(245,184,0,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ccc;margin-bottom:16px;}
input{width:100%;padding:10px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:15px;margin-bottom:8px;box-sizing:border-box;}
button{width:100%;background:#F5B800;color:#0C0C1E;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;}
.err{color:#f44;font-size:12px;display:none;margin-bottom:8px;}
#debug{color:#f5b800;font-size:11px;margin-top:12px;word-break:break-all;}
</style>
</head>
<body>
<div class="card">
  <p class="gold" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;">MEC SUMMIT 2026 · CHECK-IN</p>
  <div id="root"></div>
</div>

<script>
var BASE = 'https://dayyan-morandi.github.io/mecevento/';

function mostrarQR(email, nome) {
  var token = btoa(email + '||' + nome);
  var qrData = BASE + 'admin.html?t=' + token;
  var imgSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=4&data='
               + encodeURIComponent(qrData);

  var exibicao = nome ? nome.split(' ')[0] : email;

  document.getElementById('root').innerHTML = ''
    + '<h2>Olá,</h2>'
    + '<p class="nome">' + exibicao + '</p>'
    + '<div class="qr"><img src="' + imgSrc + '" alt="QR Code"/></div>'
    + '<div class="tip">📱 Mostre este QR code na entrada do evento</div>'
    + '<div class="info">'
    +   '<strong style="color:#ccc">📅 25 de Maio de 2026</strong> · 19h00<br/>'
    +   '<strong style="color:#ccc">📍 ESPM São Paulo</strong> · Portas: 18h30'
    + '</div>'
    + '<a href="' + BASE + '" style="color:#F5B800;font-size:13px;">← Voltar ao site</a>'
    + '<p id="debug">QR: ' + qrData.substring(0,60) + '...</p>';
}

function mostrarForm() {
  document.getElementById('root').innerHTML = ''
    + '<div style="font-size:36px;margin-bottom:12px">🎟️</div>'
    + '<h2>Seu QR Code de Acesso</h2>'
    + '<p style="font-size:14px;color:#aaa;margin:12px 0;">Digite o e-mail da inscrição:</p>'
    + '<input type="email" id="em" placeholder="seu@email.com"/>'
    + '<p class="err" id="er">E-mail inválido.</p>'
    + '<button onclick="enviar()">Gerar QR Code</button>'
    + '<p style="margin-top:12px;font-size:12px;color:#888">Não inscrito? '
    +   '<a href="' + BASE + '#inscricao" style="color:#F5B800">Inscreva-se →</a></p>';

  var inp = document.getElementById('em');
  if (inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') enviar(); });
}

function enviar() {
  var em = document.getElementById('em');
  var er = document.getElementById('er');
  if (!em || !em.value.trim().includes('@')) {
    if (er) er.style.display = 'block';
    return;
  }
  mostrarQR(em.value.trim(), '');
}

// Arranque
try {
  var p = new URLSearchParams(location.search);
  var email = (p.get('email') || '').trim();
  var nome  = (p.get('nome')  || p.get('name') || '').trim();
  if (email) {
    mostrarQR(email, nome);
  } else {
    mostrarForm();
  }
} catch(e) {
  document.getElementById('root').innerHTML =
    '<p style="color:red">Erro: ' + e.message + '</p>';
}
</script>
</body>
</html>
