<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu QR Code — MEC Summit 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#0C0C1E; --card:#1C1C3A; --gold:#F5B800; --gold2:#D4A200;
      --white:#FFFFFF; --gray:#8888AA; --lgray:#CCCCDD;
      --border:rgba(245,184,0,.15); --trans:.25s ease;
    }
    body {
      font-family:'Inter',Arial,sans-serif;
      background: radial-gradient(ellipse 70% 50% at 50% 0%,rgba(245,184,0,.06) 0%,transparent 70%),
                  radial-gradient(ellipse 60% 50% at 20% 100%,rgba(46,46,142,.15) 0%,transparent 60%),#0C0C1E;
      color:var(--white); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:40px 24px; -webkit-font-smoothing:antialiased;
    }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding:48px 40px; max-width:480px; width:100%; text-align:center;
      box-shadow:0 32px 80px rgba(0,0,0,.4);
    }
    @media(max-width:480px){.card{padding:32px 20px;}}
    .brand { font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; }
    h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
    .name { font-size:28px; font-weight:900; color:var(--gold); margin-bottom:28px; }
    .qr-box {
      background:#fff; border-radius:16px; padding:20px;
      display:inline-flex; align-items:center; justify-content:center;
      margin-bottom:24px; box-shadow:0 8px 32px rgba(0,0,0,.3);
    }
    .qr-box canvas { display:block; }
    .tip {
      background:rgba(245,184,0,.08); border:1px solid rgba(245,184,0,.2);
      border-radius:10px; padding:14px 18px; font-size:13px; color:var(--lgray);
      line-height:1.6; margin-bottom:24px;
    }
    .tip strong { color:var(--gold); }
    .info { font-size:13px; color:var(--gray); line-height:1.7; margin-bottom:28px; }
    .info strong { color:var(--lgray); }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:12px 24px; border-radius:8px; font-size:13px; font-weight:700;
      text-decoration:none; transition:all var(--trans); border:none; cursor:pointer; font-family:inherit;
    }
    .btn-outline { background:transparent; color:var(--lgray); border:1px solid rgba(255,255,255,.15); }
    .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
    .btn-gold { background:var(--gold); color:var(--black); }
    .btn-gold:hover { background:var(--gold2); }
    .input {
      flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
      border-radius:8px; padding:12px 14px; font-size:14px; color:#fff;
      font-family:inherit; outline:none;
    }
    .input:focus { border-color:var(--gold); }
    .input::placeholder { color:rgba(255,255,255,.25); }
    .row { display:flex; gap:8px; margin-bottom:8px; }
    .err { color:#ef4444; font-size:12px; display:none; }
  </style>
</head>
<body>
<div class="card">
  <p class="brand">MEC Summit 2026 · Check-in</p>

  <!-- Tela do QR -->
  <div id="tela-qr" style="display:none;">
    <h1>Olá,</h1>
    <p class="name" id="nome-display">—</p>
    <div class="qr-box"><canvas id="qr-canvas"></canvas></div>
    <div class="tip"><strong>Como usar:</strong> Mostre este QR code na entrada do evento.</div>
    <div class="info">
      <strong>📅 25 de Maio de 2026</strong> · 19h00<br />
      <strong>📍 ESPM São Paulo</strong> · Portas abrem às 18h30
    </div>
    <a href="index.html" class="btn btn-outline">← Voltar ao site</a>
  </div>

  <!-- Tela do formulário -->
  <div id="tela-form">
    <div style="font-size:40px;margin-bottom:16px;">🎟️</div>
    <h1 style="margin-bottom:12px;">Seu QR code</h1>
    <p style="font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:20px;text-align:left;">
      Digite o e-mail usado na inscrição:
    </p>
    <div class="row">
      <input type="email" id="inp-email" class="input" placeholder="seu@email.com" />
      <button class="btn btn-gold" onclick="iniciar()">Gerar</button>
    </div>
    <p class="err" id="err">Digite um e-mail válido.</p>
    <p style="margin-top:20px;font-size:12px;color:var(--gray);">
      Não se inscreveu? <a href="index.html#inscricao" style="color:var(--gold);">Inscreva-se grátis →</a>
    </p>
  </div>
</div>

// ── App ───────────────────────────────────────────────────────────────────────
function mostrarQR(email, nome) {
  document.getElementById('tela-form').style.display = 'none';
  document.getElementById('tela-qr').style.display   = 'block';
  document.getElementById('nome-display').textContent = nome ? nome.split(' ')[0] : email;

  // Payload como URL — leitores de QR abrem o browser, não o e-mail
  var token   = btoa(unescape(encodeURIComponent(JSON.stringify({ email: email, nome: nome }))));
  var payload = 'https://dayyan-morandi.github.io/mecevento/admin.html?token=' + token;
  var container = document.getElementById('qr-canvas');
  try {
    var canvas = QR.create(payload, 4);
    container.parentNode.replaceChild(canvas, container);
  } catch(e) {
    container.parentNode.innerHTML =
      '<p style="color:#ef4444;font-size:13px;padding:20px;">Erro ao gerar QR code.</p>';
    console.error(e);
  }
}

function iniciar() {
  var email  = document.getElementById('inp-email').value.trim();
  var errMsg = document.getElementById('err');
  if (!email || !email.includes('@')) { errMsg.style.display='block'; return; }
  errMsg.style.display = 'none';
  mostrarQR(email, '');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.id === 'inp-email') iniciar();
});

// Inicialização
(function(){
  var p     = new URLSearchParams(location.search);
  var email = (p.get('email') || '').trim();
  var nome  = (p.get('nome')  || p.get('name') || '').trim();
  if (email) { mostrarQR(email, nome); }
  else        { document.getElementById('tela-form').style.display = 'block'; }
})();
</script>
